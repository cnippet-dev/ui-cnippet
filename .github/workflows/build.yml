name: Build

on:
  workflow_call:

env:
  BUN_VERSION: 1.3.6
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # Next.js stores compiled page/component cache in .next/cache.
      # Restoring it skips re-compiling unchanged files, cutting build time significantly.
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/ui/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/ui/**/*.ts', 'apps/ui/**/*.tsx', 'apps/ui/**/*.mts') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build
        run: bun run build
