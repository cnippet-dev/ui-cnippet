name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Disable Next.js telemetry in CI
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ─── Job 1: Lint ─────────────────────────────────────────────────────────────
  # Fast feedback — catches code style errors before the expensive build
  quality:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  # ─── Job 2: Build ────────────────────────────────────────────────────────────
  # Runs only after quality passes — verifies the full Next.js build succeeds
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # Next.js stores compiled page/component cache in .next/cache.
      # Restoring it skips re-compiling unchanged files, cutting build time significantly.
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/ui/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/ui/**/*.ts', 'apps/ui/**/*.tsx', 'apps/ui/**/*.mts') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
